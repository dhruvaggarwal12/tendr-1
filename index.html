    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://tendr-1.vercel.app/#organization",
      "name": "Tendr",
      "alternateName": "Tendr Celebrations",
      "description": "Tendr is a modern celebration and event planning platform that helps people discover, compare, shortlist, plan and book trusted vendors for private and corporate celebrations across Delhi NCR.",
      "url": "https://tendr-1.vercel.app",
      "logo": {
        "@type": "ImageObject",
        "url": "https://tendr-1.vercel.app/tendr-icon.png",
        "width": 512,
        "height": 512
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "contacttendr@gmail.com",
        "availableLanguage": ["English", "Hindi"]
      },
      "areaServed": [
        { "@type": "City", "name": "Delhi", "sameAs": "https://en.wikipedia.org/wiki/Delhi" },
        { "@type": "City", "name": "Noida", "sameAs": "https://en.wikipedia.org/wiki/Noida" },
        { "@type": "City", "name": "Gurugram" },
        { "@type": "City", "name": "Ghaziabad" },
        { "@type": "City", "name": "Faridabad" },
        { "@type": "City", "name": "Greater Noida" }
      ],
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://tendr-1.vercel.app/#website",
      "name": "Tendr",
      "url": "https://tendr-1.vercel.app",
      "description": "Celebration and event planning platform for Delhi NCR",
      "publisher": { "@id": "https://tendr-1.vercel.app/#organization" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://tendr-1.vercel.app/listings?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

        { "@type": "City", "name": "Ghaziabad" },

          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Surprise Party Planning", "areaServed": "Delhi NCR" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Baby Shower Planning", "areaServed": "Delhi NCR" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Corporate Event Planning", "areaServed": "Delhi NCR" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Wedding Catering", "areaServed": "Delhi NCR" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Event Photography", "areaServed": "Delhi NCR" } },

    <!-- JSON-LD: FAQ (matches visible FAQ section) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Tendr free to use?",
          "acceptedAnswer": { "@type": "Answer", "text": "Browsing vendors, saving favourites and filling your event form is completely free. You only pay when you confirm your booking and proceed to payment." }
        },
        {
          "@type": "Question",
          "name": "What is the difference between 'You Do It' and 'Let Us Do It' on Tendr?",
          "acceptedAnswer": { "@type": "Answer", "text": "'You Do It' lets you browse and shortlist vendors yourself, then chat with them to confirm pricing. 'Let Us Do It' means our planning team selects the right vendors for your celebration and coordinates everything — you just review and approve." }
        },
        {
          "@type": "Question",
          "name": "How do I know if vendors are trustworthy on Tendr?",
          "acceptedAnswer": { "@type": "Answer", "text": "Every vendor on Tendr goes through a manual verification process before being listed. They are checked for legitimacy, experience and service quality. You can also see their ratings, years of experience and portfolio before reaching out." }
        },
        {
          "@type": "Question",
          "name": "When do I pay, and is my payment safe on Tendr?",
          "acceptedAnswer": { "@type": "Answer", "text": "Payment happens only after you have chatted with vendors, reviewed the full price breakdown and confirmed everything. We never charge before you are satisfied with the quote." }
        },
        {
          "@type": "Question",
          "name": "What cities does Tendr currently serve?",
          "acceptedAnswer": { "@type": "Answer", "text": "Tendr currently operates across Delhi, Noida, Greater Noida, Ghaziabad, Gurugram and Faridabad — covering all major event locations across the Delhi NCR region." }
        },
        {
          "@type": "Question",
          "name": "What types of celebrations can I plan on Tendr?",
          "acceptedAnswer": { "@type": "Answer", "text": "Tendr supports birthdays, anniversaries, balloon decorations, surprise parties, house parties, baby showers, office celebrations, farewell parties, festive celebrations, engagements, romantic room setups, corporate events and more." }
        },
        {
          "@type": "Question",
          "name": "How long does it take to get vendor quotes on Tendr?",
          "acceptedAnswer": { "@type": "Answer", "text": "Once your chat is approved, most vendors respond within a few hours. Price confirmation typically happens within 24–48 hours of starting the conversation." }
        }
      ]
    }
    </script>
