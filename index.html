<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tendr-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Tendr — Event Planning & Vendor Booking in Delhi NCR</title>
    <meta name="description" content="Plan weddings, birthdays, corporate events and more across Delhi, Noida, Gurgaon and Ghaziabad. Browse 100+ verified DJs, caterers, photographers and decorators. Book with confidence on Tendr." />
    <meta name="keywords" content="event planning Delhi NCR, wedding caterer Noida, DJ booking Ghaziabad, event decorator Greater Noida, photographer Delhi, Tendr event platform" />
    <meta name="author" content="Tendr" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tendr-1.vercel.app/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tendr-1.vercel.app/" />
    <meta property="og:title" content="Tendr — Event Planning & Vendor Booking in Delhi NCR" />
    <meta property="og:description" content="Plan your perfect event with verified caterers, DJs, photographers and decorators across Delhi NCR. Browse, chat and book — all in one place." />
    <meta property="og:image" content="https://tendr-1.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Tendr" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tendr — Event Planning in Delhi NCR" />
    <meta name="twitter:description" content="Verified vendors for weddings, birthdays, corporate events across Delhi, Noida, Gurgaon and Ghaziabad." />
    <meta name="twitter:image" content="https://tendr-1.vercel.app/og-image.png" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="IN-DL" />
    <meta name="geo.placename" content="Delhi NCR" />

    <!-- Theme color -->
    <meta name="theme-color" content="#C47A2E" />

    <!-- JSON-LD: LocalBusiness + EventPlanningService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Tendr",
      "description": "Event planning platform connecting customers with verified vendors — caterers, DJs, photographers, decorators — across Delhi NCR.",
      "url": "https://tendr-1.vercel.app",
      "logo": "https://tendr-1.vercel.app/tendr-icon.png",
      "email": "contacttendr@gmail.com",
      "areaServed": [
        { "@type": "City", "name": "Delhi" },
        { "@type": "City", "name": "Noida" },
        { "@type": "City", "name": "Greater Noida" },
        { "@type": "City", "name": "Ghaziabad" }
      ],
      "serviceType": [
        "Wedding Planning",
        "Event Planning",
        "Catering",
        "Photography",
        "DJ & Entertainment",
        "Event Decoration"
      ],
      "priceRange": "₹₹",
      "openingHours": "Mo-Su 09:00-21:00",
      "sameAs": []
    }
    </script>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
